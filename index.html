<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/conuspots.svg" />

      <a

      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"

          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"

      style="position: absolute"
      class="top-0 bottom-0 w-full"
    ></mapbox-map>
    <script type="module" src="/src/main.ts"></script>

</html>
